<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi 3D VJ Visualizer - Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Share+Tech+Mono&family=Montserrat:wght@100;300;900&family=Oswald:wght@700&display=swap');

        :root {
            /* Sci-Fi Default */
            --primary: #ff2a55;
            --secondary: #00e5ff;
            --bg: #05000a;
            --panel-bg: rgba(10, 0, 5, 0.7);
            --panel-border: 1px solid rgba(255, 42, 85, 0.3);
            --panel-shadow: 0 0 15px rgba(255, 42, 85, 0.1);
            --font-main: 'Share Tech Mono', monospace;
            --font-title: 'Share Tech Mono', monospace;
            --text-shadow: none;
            --bar-radius: 2px;
            --btn-border: 1px solid var(--primary);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); overflow: hidden;
            font-family: var(--font-main); color: var(--primary);
            user-select: none; transition: background-color 0.1s;
        }

        /* --- THEME OVERRIDES --- */
        body.popart-mode {
            --primary: #ffea00; --secondary: #ff0055; --bg: #000000; --panel-bg: #ffffff;
            --panel-border: 4px solid #000000; --panel-shadow: 8px 8px 0px rgba(0,0,0,1);
            --font-main: 'Bangers', cursive; --font-title: 'Bangers', cursive;
            --text-shadow: 2px 2px 0px #000; --bar-radius: 0px; --btn-border: 4px solid #000;
            color: #000 !important;
        }
        body.brutalist-mode {
            --primary: #ffffff; --secondary: #aaaaaa; --bg: #0a0a0a; --panel-bg: rgba(20, 20, 20, 0.9);
            --panel-border: 2px solid #555555; --panel-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            --font-main: 'Oswald', sans-serif; --font-title: 'Montserrat', sans-serif;
            --text-shadow: none; --bar-radius: 0px; --btn-border: 2px solid #ffffff;
            color: #ffffff !important;
        }
        body.retro-mode {
            --primary: #fbc531; --secondary: #e84393; --bg: #192a56; --panel-bg: rgba(25, 42, 86, 0.85);
            --panel-border: 2px solid #fbc531; --panel-shadow: 8px 8px 0px rgba(232, 67, 147, 0.5);
            --font-main: 'Montserrat', sans-serif; --font-title: 'Oswald', sans-serif;
            --text-shadow: 2px 2px 0px #192a56; --bar-radius: 8px; --btn-border: 2px solid #fbc531;
            color: #f5f6fa !important;
        }
        body.cosmic-mode {
            --primary: #2ed573; --secondary: #ffffff; --bg: #030308; --panel-bg: rgba(10, 10, 15, 0.7);
            --panel-border: 1px solid rgba(255,255,255,0.1); --panel-shadow: 0 0 20px rgba(46, 213, 115, 0.1);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; --font-title: 'Montserrat', sans-serif;
            --text-shadow: 0 2px 10px rgba(0,0,0,0.8); --bar-radius: 4px; --btn-border: 1px solid #2ed573;
            color: #ddd !important;
        }
        body.fractal-mode {
            --primary: #a29bfe; --secondary: #00cec9; --bg: #030008; --panel-bg: rgba(10, 0, 20, 0.8);
            --panel-border: 1px solid rgba(162, 155, 254, 0.3); --panel-shadow: 0 0 20px rgba(0, 206, 201, 0.2);
            --font-main: 'Montserrat', sans-serif; --font-title: 'Share Tech Mono', monospace;
            --text-shadow: 0 0 8px #a29bfe; --bar-radius: 4px; --btn-border: 1px solid #00cec9;
            color: #e0e0e0 !important;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(5, 0, 10, 0.95); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }
        body.popart-mode #splash-screen { background-color: #ff0055; }
        body.brutalist-mode #splash-screen { background-color: #111; }
        body.retro-mode #splash-screen { background-color: #192a56; }
        body.cosmic-mode #splash-screen { background-color: #030308; }
        body.fractal-mode #splash-screen { background-color: #030008; }

        .splash-title {
            font-family: 'Montserrat', sans-serif; font-weight: 100; font-size: 2.5rem;
            letter-spacing: 12px; color: var(--primary); text-align: center; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 42, 85, 0.4); max-width: 80%; line-height: 1.4;
        }
        body.popart-mode .splash-title { font-family: 'Bangers'; font-weight: normal; letter-spacing: 5px; text-shadow: 4px 4px 0px #000; color: #ffea00; font-size: 4rem; }
        body.brutalist-mode .splash-title { font-weight: 900; letter-spacing: 8px; text-shadow: none; color: #fff; }
        body.retro-mode .splash-title { font-family: 'Oswald'; font-weight: 900; letter-spacing: 8px; text-shadow: 4px 4px 0px #e84393; color: #fbc531; font-size: 4rem; }
        body.cosmic-mode .splash-title { font-weight: 300; letter-spacing: 12px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); color: #fff; }
        body.fractal-mode .splash-title { font-weight: 900; letter-spacing: 15px; text-shadow: 0 0 30px #00cec9; color: #a29bfe; }
        
        .splash-subtitle { font-size: 0.9rem; color: #888; margin-bottom: 50px; letter-spacing: 3px; text-transform: uppercase; }
        body.popart-mode .splash-subtitle { color: #fff; font-family: 'Bangers'; font-size: 1.2rem; text-shadow: 2px 2px 0px #000; }
        body.brutalist-mode .splash-subtitle { color: #888; font-family: 'Oswald'; letter-spacing: 4px; }
        body.retro-mode .splash-subtitle { color: #f5f6fa; font-family: 'Montserrat'; font-weight: bold; letter-spacing: 4px; }
        body.cosmic-mode .splash-subtitle { color: #888; font-family: 'Segoe UI'; letter-spacing: 4px; }
        body.fractal-mode .splash-subtitle { color: #00cec9; font-family: 'Share Tech Mono'; letter-spacing: 6px; }

        .splash-btn {
            background: transparent; border: var(--btn-border); color: var(--secondary);
            padding: 15px 50px; font-size: 1.2rem; font-family: var(--font-title);
            cursor: pointer; letter-spacing: 6px; text-transform: uppercase;
            transition: all 0.3s ease; box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        body.popart-mode .splash-btn { background: #ffea00; color: #000; box-shadow: 6px 6px 0px #000; letter-spacing: 2px; }
        body.popart-mode .splash-btn:hover { background: #00e5ff; transform: translate(-4px, -4px); box-shadow: 10px 10px 0px #000; }
        body.brutalist-mode .splash-btn { background: #fff; color: #000; box-shadow: none; font-weight: 900; }
        body.brutalist-mode .splash-btn:hover { background: #555; color: #fff; border-color: #555; }
        body.retro-mode .splash-btn { background: #e84393; color: #fff; box-shadow: 6px 6px 0px #fbc531; border: 2px solid #fff; border-radius: 8px;}
        body.retro-mode .splash-btn:hover { background: #fbc531; color: #192a56; box-shadow: 10px 10px 0px #e84393; transform: translate(-4px, -4px); }
        body.cosmic-mode .splash-btn { background: rgba(46, 213, 115, 0.2); color: #2ed573; box-shadow: 0 0 15px rgba(46, 213, 115, 0.2); border-radius: 30px; }
        body.fractal-mode .splash-btn { background: rgba(162, 155, 254, 0.1); color: #00cec9; box-shadow: 0 0 20px rgba(0, 206, 201, 0.3); border-radius: 4px; }
        .splash-btn:hover { background: var(--secondary); color: var(--bg); box-shadow: 0 0 30px var(--secondary); transform: scale(1.05); }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; transition: transform 0.05s; }
        #aura-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; display: none; pointer-events: none; }

        /* HUD Overlay */
        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none;
            display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 50%, rgba(20, 0, 10, 0.4) 100%); transition: opacity 0.3s;
        }
        body.popart-mode #hud-layer, body.brutalist-mode #hud-layer, body.retro-mode #hud-layer, body.cosmic-mode #hud-layer, body.fractal-mode #hud-layer { background: none; }

        .hud-panel {
            background: var(--panel-bg); border: var(--panel-border); padding: 15px; backdrop-filter: blur(4px);
            box-shadow: var(--panel-shadow); width: 250px; height: fit-content; margin-bottom: 15px;
            pointer-events: auto; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.popart-mode .hud-panel { transform: rotate(-1.5deg); }
        body.popart-mode .hud-panel:nth-child(2) { transform: rotate(1deg); }
        body.brutalist-mode .hud-panel { border-radius: 0; border: 1px solid #444; }
        body.retro-mode .hud-panel { border-radius: 12px; }
        body.cosmic-mode .hud-panel { border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        body.fractal-mode .hud-panel { border-radius: 8px; border-left: 3px solid #00cec9; backdrop-filter: blur(12px); }

        .hud-title {
            font-family: var(--font-title); font-size: 1rem; letter-spacing: 2px;
            border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase;
        }
        body.popart-mode .hud-title { font-size: 1.5rem; letter-spacing: 1px; border-bottom: 4px solid #000; color: #ff0055; text-shadow: 1px 1px 0px #000;}
        body.brutalist-mode .hud-title { font-weight: 900; letter-spacing: 3px; color: #fff; border-bottom: 1px solid #fff; }
        body.retro-mode .hud-title { font-weight: 700; letter-spacing: 2px; color: #fbc531; border-bottom: 3px solid #e84393; }
        body.cosmic-mode .hud-title { font-weight: 300; font-size: 0.9rem; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); }
        body.fractal-mode .hud-title { font-weight: 900; letter-spacing: 4px; color: #a29bfe; border-bottom: 1px solid rgba(0, 206, 201, 0.5); }

        .effect-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .effect-list::-webkit-scrollbar { width: 6px; }
        .effect-list::-webkit-scrollbar-track { background: rgba(255, 42, 85, 0.1); }
        .effect-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
        
        body.popart-mode .effect-list::-webkit-scrollbar-track { background: #eee; border-left: 2px solid #000; }
        body.popart-mode .effect-list::-webkit-scrollbar-thumb { background: #ff0055; border: 1px solid #000; border-radius: 0; }
        body.brutalist-mode .effect-list::-webkit-scrollbar-track { background: #222; }
        body.brutalist-mode .effect-list::-webkit-scrollbar-thumb { background: #fff; border-radius: 0; }
        body.retro-mode .effect-list::-webkit-scrollbar-track { background: #2f3640; border-radius: 4px;}
        body.retro-mode .effect-list::-webkit-scrollbar-thumb { background: #e84393; border-radius: 4px; }
        body.cosmic-mode .effect-list::-webkit-scrollbar-track { background: transparent; }
        body.cosmic-mode .effect-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        body.fractal-mode .effect-list::-webkit-scrollbar-track { background: transparent; }
        body.fractal-mode .effect-list::-webkit-scrollbar-thumb { background: #00cec9; border-radius: 4px; }

        .effect-item { font-size: 0.7rem; margin-bottom: 8px; display: flex; flex-direction: column; align-items: flex-start; opacity: 0.5; transition: all 0.1s; }
        body.popart-mode .effect-item { font-size: 1rem; opacity: 0.7; }
        body.brutalist-mode .effect-item { font-size: 0.85rem; opacity: 0.4; letter-spacing: 1px;}
        body.retro-mode .effect-item { font-size: 0.8rem; opacity: 0.6; font-weight: 600;}
        body.cosmic-mode .effect-item { font-size: 0.8rem; opacity: 0.6; }
        body.fractal-mode .effect-item { font-size: 0.8rem; font-weight: bold; opacity: 0.6; }

        .effect-item-header { display: flex; align-items: center; width: 100%; }
        .effect-item.active { opacity: 1; color: var(--secondary); text-shadow: var(--text-shadow); }
        body.popart-mode .effect-item.active { color: #000; text-shadow: none; font-weight: bold; background: #ffea00; padding-left: 5px; border: 2px solid #000; box-shadow: 2px 2px 0px #000;}
        body.brutalist-mode .effect-item.active { color: #fff; opacity: 1; font-weight: bold; text-shadow: none; }
        body.retro-mode .effect-item.active { color: #fbc531; opacity: 1; text-shadow: 1px 1px 0px #e84393; }
        body.cosmic-mode .effect-item.active { color: #2ed573; opacity: 1; text-shadow: 0 0 8px rgba(46, 213, 115, 0.5); }
        body.fractal-mode .effect-item.active { color: #00cec9; text-shadow: 0 0 10px #00cec9; }

        .effect-value-bar { height: 4px; background: var(--secondary); margin-top: 4px; border-radius: var(--bar-radius); box-shadow: 0 0 5px var(--secondary); transition: width 0.05s; }
        body.popart-mode .effect-value-bar { height: 8px; background: #00e5ff; border: 2px solid #000; box-shadow: none; }
        body.brutalist-mode .effect-value-bar { background: #fff; box-shadow: none; }
        body.retro-mode .effect-value-bar { background: #4cd137; height: 6px; box-shadow: none; }
        body.cosmic-mode .effect-value-bar { background: #2ed573; box-shadow: none; border-radius: 4px; }
        body.fractal-mode .effect-value-bar { background: #00cec9; box-shadow: 0 0 8px #00cec9; }

        .key-badge {
            display: inline-block; background: rgba(255, 255, 255, 0.1); border: 1px solid currentColor;
            padding: 2px 6px; margin-right: 10px; border-radius: var(--bar-radius); min-width: 15px;
            text-align: center; font-weight: bold; text-transform: uppercase;
        }
        body.popart-mode .key-badge { background: #ff0055; color: #fff; border: 2px solid #000; text-shadow: 1px 1px 0px #000; }
        body.brutalist-mode .key-badge { background: #fff; color: #000; border: none; }
        body.retro-mode .key-badge { background: #e84393; color: #fff; border: none; text-shadow: none; }
        body.cosmic-mode .key-badge { background: transparent; color: currentColor; border: 1px solid currentColor; border-radius: 4px;}
        body.fractal-mode .key-badge { background: rgba(0, 206, 201, 0.2); color: #00cec9; border: 1px solid #00cec9; }

        #scanlines {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 20; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; opacity: 0; transition: opacity 0.1s;
        }
        body.scifi-mode #scanlines { opacity: 0.3; } 
        body.retro-mode #scanlines { opacity: 0.1; background: url('data:image/svg+xml;utf8,<svg width="4" height="4" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="white"/></svg>'); background-size: 4px 4px; }
        body.fractal-mode #scanlines { opacity: 0.1; background-size: 100% 2px;}

        .mode-controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 50; display: flex; flex-wrap: wrap; gap: 10px; max-width: 800px; pointer-events: auto; align-items: center;
        }

        .top-btn {
            background: var(--panel-bg); border: var(--btn-border); color: var(--primary); padding: 8px 15px;
            font-family: var(--font-title); font-size: 0.8rem; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; box-shadow: var(--panel-shadow); backdrop-filter: blur(4px);
        }
        body.popart-mode .top-btn { font-size: 1.2rem; letter-spacing: 1px; }
        body.brutalist-mode .top-btn { font-weight: 900; letter-spacing: 2px; }
        body.retro-mode .top-btn { font-weight: bold; border-radius: 8px; font-size: 1rem; }
        body.cosmic-mode .top-btn { font-size: 0.8rem; border-radius: 20px; font-family: 'Segoe UI'; letter-spacing: 1px; }
        body.fractal-mode .top-btn { font-weight: bold; border-left: 4px solid #00cec9; border-radius: 4px; }
        
        .top-btn:hover, .top-btn.active { background: var(--primary); color: var(--bg); box-shadow: 0 0 15px var(--primary); }
        body.popart-mode .top-btn:hover, body.popart-mode .top-btn.active { background: #00e5ff; color: #000; transform: translate(-4px, -4px); box-shadow: 8px 8px 0px #000; }
        body.brutalist-mode .top-btn:hover, body.brutalist-mode .top-btn.active { background: #fff; color: #000; box-shadow: none; }
        body.retro-mode .top-btn:hover, body.retro-mode .top-btn.active { background: #fbc531; color: #192a56; box-shadow: 4px 4px 0px #e84393; transform: translate(-2px, -2px); }
        body.cosmic-mode .top-btn:hover, body.cosmic-mode .top-btn.active { background: #2ed573; color: #000; box-shadow: 0 0 15px #2ed573; }
        body.fractal-mode .top-btn:hover, body.fractal-mode .top-btn.active { background: #00cec9; color: #090014; box-shadow: 0 0 20px #00cec9; }

    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="scifi-mode">

    <div id="splash-screen">
        <div class="splash-title">WELCOME TO SHASTRIS VISUAL TRIGGER STUDIO</div>
        <div class="splash-subtitle">(Connect MIDI Keyboard & Allow Microphone Access)</div>
        <button class="splash-btn" id="initiate-btn">INITIATE & CONNECT</button>
    </div>

    <div id="webgl-container"></div>
    <canvas id="aura-canvas"></canvas>
    <div id="scanlines"></div>
    
    <div id="hud-layer">
        <div style="display: flex; flex-direction: column;">
            <div class="hud-panel">
                <div class="hud-title" id="scenes-title">Scenes (TRIGGER A-Y)</div>
                <ul class="effect-list" id="scenes-list"></ul>
            </div>
            <div class="hud-panel">
                <div class="hud-title">FX Engine (KNOBS 1-8)</div>
                <ul class="effect-list" id="effects-list"></ul>
            </div>
        </div>

        <div class="mode-controls" id="mode-controls-container">
            <button id="bank-toggle-btn" class="top-btn" style="border-color: #00e5ff; color: #00e5ff; background: rgba(0,0,0,0.8);">BANK: SCI-FI NEON (◀/▶)</button>
            <button id="mode-toggle-btn" class="top-btn">MODE: TRIGGER (SHIFT)</button>
            <button id="ui-toggle-btn" class="top-btn">TOGGLE UI (TAB)</button>
            <button id="reset-fx-btn" class="top-btn" style="border-color: #ff2a55;">RESET FX (ENTER)</button>
            <button id="oh-shit-btn" class="top-btn" style="border-color: #ffea00; color: #ffea00;">OH SHIT! (OFF) (CTRL)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // --- GLOBAL COLOR FLASH VARIABLES ---
        let bgFlashColor = new THREE.Color(0x000000);
        let bgFlashIntensity = 0.0;
        let isOhShitMode = false;

        function triggerBgFlash(keyCodeOrNote) {
            if (isOhShitMode) {
                // Determine a unique hue based on the key
                const hue = (keyCodeOrNote * 137.5) % 360; 
                bgFlashColor.setHSL(hue / 360, 1.0, 0.5);
                bgFlashIntensity = 1.0;
            }
        }

        // --- CUSTOM SHADERS ---
        const PopArtShader = {
            uniforms: { "tDiffuse": { value: null }, "gridSize": { value: 1.0 }, "dotScale": { value: 0.0 }, "paperGrain": { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float gridSize; uniform float dotScale; uniform float paperGrain; varying vec2 vUv;
                float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
                void main() {
                    vec2 uv = fract(vUv * gridSize); vec4 color = texture2D(tDiffuse, uv);
                    if (color.a < 0.1) { gl_FragColor = color; return; }
                    if (gridSize > 1.5) {
                        float colIndex = floor(vUv.x * gridSize) + floor(vUv.y * gridSize) * 2.0;
                        if (mod(colIndex, 3.0) == 0.0) color.rgb *= vec3(1.2, 0.5, 0.8); else if (mod(colIndex, 3.0) == 1.0) color.rgb *= vec3(0.5, 1.2, 0.5); else color.rgb *= vec3(0.5, 0.8, 1.2);
                    }
                    if (dotScale > 0.0) {
                        float dotSize = 10.0 + (1.0 - dotScale) * 40.0; vec2 dotUV = vUv * 800.0 / dotSize; 
                        float pattern = sin(dotUV.x) * sin(dotUV.y); float lum = dot(color.rgb, vec3(0.299, 0.587, 0.114));
                        if (lum < pattern * 0.5 + 0.5) color.rgb -= vec3(0.3 * dotScale);
                    }
                    if (paperGrain > 0.0) {
                        float noise = rand(vUv * 100.0); vec3 sepia = vec3(1.0, 0.9, 0.8);
                        color.rgb = mix(color.rgb, color.rgb * sepia * (0.8 + 0.2*noise), paperGrain);
                    }
                    gl_FragColor = color;
                }
            `
        };

        const BrutalistShader = {
            uniforms: { "tDiffuse": { value: null }, "kaleidoscope": { value: 0.0 }, "contrast": { value: 0.0 }, "aspect": { value: 1.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `

                if (isDown) {
                    if(sceneMode === 'TRIGGER' && !sceneConfig.active) { sceneConfig.active = true; updateUI(); }

        window.addEventListener('keydown', (e) => {
            const code = e.code || '';
            const keyLower = (e.key || '').toLowerCase();

            // 1. Robust System Key Interception (Stops browser from opening menus/scrolling/clicking buttons)
            if (code === 'Enter' || code.startsWith('Alt') || code.startsWith('Control') || code.startsWith('Meta') || code === 'Tab' || code === 'Space' || code.startsWith('Arrow')) {
                e.preventDefault();
            }

            if (e.repeat) return; 

            // Trigger global color flash
            triggerBgFlash(e.keyCode || (e.key ? e.key.charCodeAt(0) : 0));

            // 2. Handle System / UI Toggles
            if (code === 'Enter') {
                resetKnobs();
                return;
            }
            if (code.startsWith('Control') || code.startsWith('Meta')) {
                toggleOhShit();
                return;
            }
            if (code.startsWith('Shift')) {
                sceneMode = sceneMode === 'TRIGGER' ? 'LATCH' : 'TRIGGER'; 
                document.getElementById('mode-toggle-btn').innerText = `MODE: ${sceneMode} (SHIFT)`;
                return;

            if (code === 'ArrowDown') { moveState.down = true; return; }
            if (code === 'ArrowLeft') { toggleBank(-1); return; }
            if (code === 'ArrowRight') { toggleBank(1); return; }
            
            // 4. Handle Scenes & Effects (Letters & Numbers)
            const sceneIdx = BANKS[activeBankIdx].scenes.findIndex(s => s.key === keyLower);
            if (sceneIdx !== -1) {
                if (activeBankIdx === 4) {
                    spawnAura(36 + sceneIdx, 90 + Math.random() * 37);

                    const col1 = genColors[sceneIdx % 12];
                    const col2 = genColors[(sceneIdx + 5) % 12];
                    fractalPass.uniforms.color1.value.setHSL(col1[0], col1[1], col1[2]);
                    fractalPass.uniforms.color2.value.setHSL(col2[0], col2[1], col2[2]);
                    beatScale = 2.0; 
                }
            }

            handleSceneKey(keyLower, true);
            const effectConfig = BANKS[activeBankIdx].effects.find(eff => eff.key === keyLower);

                e.preventDefault();
                return;

            if (code === 'ArrowDown') { moveState.down = false; return; }

        function setupMidiInput(input) {
            input.onmidimessage = (msg) => {
                const [command, data1, data2] = msg.data;
                const channel = command & 0x0F; 
                const currentBank = BANKS[activeBankIdx];
                
                // CC Handling (Knobs K1-K8)
                if (command >= 176 && command <= 191) {
                    let effectIdx = -1;
                    if (data1 >= 70 && data1 <= 77) effectIdx = data1 - 70; else if (data1 >= 1 && data1 <= 8) effectIdx = data1 - 1;
                    if (effectIdx !== -1 && currentBank.effects[effectIdx].name !== 'UNASSIGNED') {
                        currentBank.effects[effectIdx].value = data2 / 127.0; updateUI();
                    }
                    return; 
                }

                const isNoteOn = (command >= 144 && command <= 159) && data2 > 0;
                const isNoteOff = (command >= 128 && command <= 143) || ((command >= 144 && command <= 159) && data2 === 0);

                let sceneKey = null;
                let isPad = (channel === 9);

                if (!isNoteOn && !isNoteOff) return;

                if (!isPad) {
                    let index = data1 - 48; // Base C2
                    if (data1 < 48) index = data1 - 36; // Octave Down
                    else if (data1 > 72) index = data1 - 60; // Octave Up
                    if (index >= 0 && index <= 24) sceneKey = String.fromCharCode(97 + index);
                }

                if (isNoteOn) { 
                    triggerBgFlash(data1); // Trigger Global Flash
                    
                    if (isPad) {
                        if (data1 === 36 || data1 === 37 || data1 === 44) beatScale = 1.5;
                        else if (data1 === 38 || data1 === 39 || data1 === 45) toggleBank(); // Pad 2

                        } 
                        else if (data1 === 48 || data1 === 49 || data1 === 51) { // Pad 5
                            resetKnobs();
                        }

                        if (sceneKey) {
                            const sceneIdx = sceneKey.charCodeAt(0) - 97;
                            if (activeBankIdx === 4) {
                                spawnAura(data1, data2);
                                beatScale = 1.5;
                            } else if (activeBankIdx === 5) {
                                const col1 = genColors[sceneIdx % 12];
                                const col2 = genColors[(sceneIdx + 5) % 12];
                                fractalPass.uniforms.color1.value.setHSL(col1[0], col1[1], col1[2]);
                                fractalPass.uniforms.color2.value.setHSL(col2[0], col2[1], col2[2]);

                        }

                }

                if (eff[2].value > 0) filterStr += `hue-rotate(${eff[2].value * 300}deg) `;
                document.body.style.filter = filterStr.trim();
                
                scene.background = (eff[1].value > 0.05 && (Math.floor(t * (10 + eff[1].value * 30)) % 2 === 0)) ? new THREE.Color().setHSL(0, 0, eff[1].value) : new THREE.Color(0x05000a);
                document.getElementById('scanlines').style.opacity = 0.3;

            } else if (activeBankIdx === 1) { // --- POP ART ---
                sciFiGroup.visible = false; popArtGroup.visible = true; brutalistGroup.visible = false; retroGroup.visible = false;
                popArtPass.enabled = true; popArtPass.uniforms['dotScale'].value = eff[0].value; popArtPass.uniforms['gridSize'].value = 1.0 + Math.floor(eff[1].value * 4); popArtPass.uniforms['paperGrain'].value = eff[5].value;
                const squash = 1.0 + (Math.sin(t*15) * eff[2].value * 0.5); masterGroup.scale.set(beatScale * (1.0/squash), beatScale * squash, beatScale);
                sunburstMat.uniforms.color1.value = new THREE.Color(0xffea00); // Fixed base color
                sunburstMesh.visible = true; sunburstMat.uniforms.time.value = t;
                if (eff[7].value > 0.05 && (Math.floor(t * (10 + eff[7].value * 30)) % 2 === 0)) scene.background = new THREE.Color(0xffffff);

                if (eff[3].value > 0) {
                    document.body.style.filter = `hue-rotate(${eff[3].value * 360}deg)`;
                }

            } else if (activeBankIdx === 2) { // --- BRUTALIST ---
                sciFiGroup.visible = false; popArtGroup.visible = false; brutalistGroup.visible = true; retroGroup.visible = false;
                brutalistPass.enabled = true; brutalistPass.uniforms['kaleidoscope'].value = eff[0].value; brutalistPass.uniforms['contrast'].value = eff[1].value; brutalistPass.uniforms['aspect'].value = camera.aspect;
                camBaseZ = 18; if (eff[4].value > 0) { orbitAngle += delta * (eff[4].value * 2.0); const phi = Math.PI/2 + Math.sin(orbitAngle * 0.618) * (Math.PI/2.2) * eff[4].value; camBaseX = 18 * Math.sin(phi) * Math.cos(orbitAngle); camBaseY = 18 * Math.cos(phi); camBaseZ = 18 * Math.sin(phi) * Math.sin(orbitAngle); } else { orbitAngle = 0; }
                currentFov += (eff[5].value * 60); 
                scene.background = (eff[7].value > 0.05 && (Math.floor(t * (10 + eff[7].value * 30)) % 2 === 0)) ? new THREE.Color(0xffffff) : new THREE.Color(0x0a0a0a);
                if (scene.background.r > 0.5) { dirLight.intensity = 0; ambLight.intensity = 0; } else { dirLight.intensity = 2.5; ambLight.intensity = 1.5; }

            } else if (activeBankIdx === 3) { // --- RETRO GEOMETRY ---
                sciFiGroup.visible = false; popArtGroup.visible = false; brutalistGroup.visible = false; retroGroup.visible = true;
                retroPass.enabled = true; 
                scene.background = new THREE.Color(0x192a56); 
                document.getElementById('scanlines').style.opacity = 0.1;
                
                retroPass.uniforms.aspect.value = camera.aspect;
                retroPass.uniforms.gridMult.value = 1.0 + Math.floor(eff[0].value * 5.0); // Grid Multiply
                if (eff[1].value > 0.1 && (Math.floor(t * 20) % 2 === 0)) { dirLight.intensity = 0; ambLight.intensity = 0; } else { dirLight.intensity = 3; ambLight.intensity = 1; } // Strobe
                retroPass.uniforms.hueShift.value = t * eff[2].value * 0.5; // Hue Cycle (Animated Continuous Cycle)
                if(eff[3].value > 0) { cx += (Math.random()-0.5) * 15 * eff[3].value; cy += (Math.random()-0.5) * 15 * eff[3].value; } // Shake
                retroPass.uniforms.kaleidoscope.value = eff[4].value; // Kaleidoscope
                
                if (eff[5].value > 0) { const snap = Math.floor(t * (1.0 + eff[5].value * 8.0)) * (Math.PI/2); retroGroup.rotation.z = snap; } else { retroGroup.rotation.z = 0; } // Snap Spin
                retroGroup.scale.z = 1.0 + (eff[6].value * 8.0); // 3D Extrude
                
                if (eff[7].value > 0) { const pump = 1.0 + (Math.sin(t * 15) * eff[7].value * 0.5); retroGroup.scale.x = pump; retroGroup.scale.y = pump; } // Kinetic Bounce
                else { retroGroup.scale.x = 1.0; retroGroup.scale.y = 1.0; }

            } else if (activeBankIdx === 4) { // --- COSMIC AURA (CANVAS 2D) ---
                sciFiGroup.visible = false; popArtGroup.visible = false; brutalistGroup.visible = false; retroGroup.visible = false;
                auraCanvas.style.display = 'block';
                scene.background = null; 

                auraCtx.globalCompositeOperation = 'source-over';
                const bgGrad = auraCtx.createLinearGradient(0, 0, 0, auraHeight);
                bgGrad.addColorStop(0, '#020005'); bgGrad.addColorStop(0.5, '#040614'); bgGrad.addColorStop(1, '#000000');
                auraCtx.fillStyle = bgGrad; auraCtx.fillRect(0, 0, auraWidth, auraHeight);
                auraCtx.globalCompositeOperation = 'lighter';

                const auraParams = {
                    swirlSpeed: eff[0].value, sizeMultiplier: eff[1].value, glowIntensity: eff[2].value, fadeSpeed: eff[3].value,
                    hueShift: eff[4].value * 0.85, turbulence: eff[5].value, saturation: eff[7].value, pulse: Math.max(0, beatScale - 1.0)
                };

                for (let i = auras.length - 1; i >= 0; i--) {
                    auras[i].update(auraParams);
                    auras[i].draw(auraCtx, auraParams);
                    if (!auras[i].active) auras.splice(i, 1);
                }

            } else if (activeBankIdx === 5) { // --- FRACTAL UNIVERSE (WEBGL SHADER) ---
                sciFiGroup.visible = false; popArtGroup.visible = false; brutalistGroup.visible = false; retroGroup.visible = false;
                fractalPass.enabled = true;
                scene.background = new THREE.Color(0x000000); 
                document.getElementById('scanlines').style.opacity = 0.1;
                
                let currentSceneIdx = 0;
                currentBank.scenes.forEach((s, idx) => { if (s.active) currentSceneIdx = idx; });

                fractalPass.uniforms.time.value = t;
                fractalPass.uniforms.zoom.value = eff[0].value;
                fractalPass.uniforms.density.value = eff[1].value;
                fractalPass.uniforms.glow.value = eff[2].value;
                fractalPass.uniforms.chaos.value = eff[3].value;
                fractalPass.uniforms.hueShift.value = eff[4].value * 0.85;
                fractalPass.uniforms.rotation.value = eff[5].value;
                fractalPass.uniforms.symmetry.value = eff[7].value;
                fractalPass.uniforms.pulse.value = Math.max(0, beatScale - 1.0);
                fractalPass.uniforms.sceneIndex.value = currentSceneIdx; 
            }

            // --- DYNAMIC BACKGROUND COLOR FLASH APPLY (SCENE Z Logic) ---
            if (bgFlashIntensity > 0) {
                if (activeBankIdx === 0 || activeBankIdx === 2 || activeBankIdx === 3) {
                    if (!scene.background || !scene.background.isColor) scene.background = new THREE.Color(0x000000);
                    scene.background.lerp(bgFlashColor, bgFlashIntensity);
                } else if (activeBankIdx === 1) {
                    sunburstMat.uniforms.color1.value.lerp(bgFlashColor, bgFlashIntensity);
                    sunburstMat.uniforms.color2.value.lerp(bgFlashColor, bgFlashIntensity);
                } else if (activeBankIdx === 4) {
                    auraCtx.globalCompositeOperation = 'source-over';
                    auraCtx.fillStyle = `rgba(${Math.floor(bgFlashColor.r*255)}, ${Math.floor(bgFlashColor.g*255)}, ${Math.floor(bgFlashColor.b*255)}, ${bgFlashIntensity * 0.4})`;
                    auraCtx.fillRect(0, 0, auraWidth, auraHeight);
                    auraCtx.globalCompositeOperation = 'lighter';
                }
                
                bgFlashIntensity -= delta * 4.0;
                if (bgFlashIntensity < 0) bgFlashIntensity = 0;
            }

            if (activeBankIdx === 5) {
                fractalPass.uniforms.flashColor.value.copy(bgFlashColor);
                fractalPass.uniforms.flashIntensity.value = bgFlashIntensity;
            }

            // WebGL specific 3D updates
            if (activeBankIdx < 4) {
                camera.position.set(camBaseX + cx, camBaseY - cy, camBaseZ); camera.lookAt(scene.position);
                camera.fov = currentFov; camera.updateProjectionMatrix();

                currentBank.scenes.forEach((s, idx) => {
                    const grpDict = [sceneRefs.scifi, sceneRefs.popart, sceneRefs.brutalist, sceneRefs.retro][activeBankIdx];
                    if(grpDict) {
                        const group = grpDict[s.key]; if (!group) return;
                        s.fade += (s.active ? delta * 8.0 : -delta * 8.0); s.fade = Math.max(0.0, Math.min(1.0, s.fade));
                        if (s.fade > 0) {
                            group.visible = true;
                            if(activeBankIdx === 2) { 
                                const vE = 1.0 + (eff[2].value * 3.0); const hE = 1.0 + (eff[3].value * 3.0);
                                group.userData.initialPositions.forEach(item => { item.mesh.position.set(item.x*hE, item.y*vE, item.z*hE); item.mesh.scale.set(item.sx*hE, item.sy*vE, item.sz*hE); });
                            } else if (activeBankIdx === 1) { 
                                group.scale.setScalar(0.5 + (s.fade * 0.5));
                            } else if (activeBankIdx === 3) {
                                // Retro scale fading logic handled globally
                            } else { 
                                group.scale.setScalar(0.8 + (s.fade * 0.2)); 
                            }
                            
                            // Apply opacity fades
                            group.userData.materials.forEach(mat => mat.opacity = mat.userData.baseOpacity * s.fade);
                        } else {
                            group.visible = false;
                        }
                        
                        if (group.visible && group.userData.anim) group.userData.anim(t);
                    }
                });
            }

            composer.render();
        }

        animate();
    </script>
</body>
</html>
